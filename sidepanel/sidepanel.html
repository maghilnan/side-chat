<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideChat</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div id="app">
    <section id="context-card" aria-label="Conversation context">
      <button id="context-header" type="button" aria-expanded="false" aria-controls="context-body">
        <span id="context-toggle-icon" aria-hidden="true">▶</span>
        <span id="context-summary">Loading conversation…</span>
      </button>
      <div id="context-body" role="region" aria-label="Full context">
        <div id="context-messages"></div>
      </div>
    </section>

    <div id="stale-banner" role="alert" aria-live="polite">
      <span>Main conversation changed. Refresh the branch if you want a new snapshot.</span>
      <button id="refresh-context-btn" type="button">Refresh</button>
    </div>

    <section id="selection-card" class="hidden" aria-label="Selected context">
      <p class="section-label">Selected context</p>
      <p id="selection-preview"></p>
    </section>

    <div id="empty-state" role="status">
      <p id="empty-state-msg"></p>
    </div>

    <section id="embed-shell" class="hidden" aria-label="Embedded ChatGPT branch">
      <div id="frame-wrap">
        <iframe
          id="chatgpt-frame"
          title="Embedded ChatGPT temporary chat"
          src="about:blank"
          allow="microphone; clipboard-read; clipboard-write; autoplay"
          referrerpolicy="origin"
        ></iframe>
        <div id="frame-overlay">
          <div class="spinner" aria-hidden="true"></div>
          <p id="frame-overlay-text">Opening temporary ChatGPT…</p>
        </div>
      </div>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
