<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideChat</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
<div id="app">

  <!-- ── Context preview card ─────────────────────────────────────────── -->
  <div id="context-card" aria-label="Conversation context">
    <div id="context-header" role="button" tabindex="0" aria-expanded="false" aria-controls="context-body">
      <span id="context-toggle-icon" aria-hidden="true">▶</span>
      <span id="context-summary">Loading conversation…</span>
    </div>
    <div id="context-body" role="region" aria-label="Full context">
      <div id="context-messages"></div>
    </div>
  </div>

  <!-- ── Stale context banner ──────────────────────────────────────────── -->
  <div id="stale-banner" role="alert" aria-live="polite">
    <span>Main conversation has new messages.</span>
    <button id="refresh-context-btn">Refresh context</button>
  </div>

  <!-- ── Empty / error states ─────────────────────────────────────────── -->
  <div id="empty-state" role="status">
    <p id="empty-state-msg"></p>
    <button class="btn btn-primary hidden" id="empty-settings-btn">Open Settings</button>
  </div>

  <!-- ── Messages area ─────────────────────────────────────────────────── -->
  <main id="messages-area" aria-label="Side chat messages" aria-live="polite"></main>

  <!-- ── Summary preview card ─────────────────────────────────────────── -->
  <div id="summary-card" aria-label="Summary preview">
    <h3>Summary Preview</h3>
    <p id="summary-generating" class="hidden">Generating summary…</p>
    <textarea id="summary-textarea" class="hidden" rows="4" aria-label="Editable summary text" placeholder="Summary will appear here…"></textarea>
    <div id="summary-actions" class="hidden">
      <button class="btn btn-primary" id="paste-summary-btn">Paste into ChatGPT</button>
      <button class="btn btn-ghost" id="copy-summary-btn">Copy</button>
      <button class="btn btn-ghost" id="cancel-summary-btn">Cancel</button>
    </div>
  </div>

  <!-- ── Input area ────────────────────────────────────────────────────── -->
  <div id="input-area">
    <div id="input-wrapper">
      <!-- Chip at top of the pill, hidden until selected text arrives -->
      <div id="selected-text-chip" class="hidden">
        <span class="chip-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M6 4a2 2 0 00-2 2v3a2 2 0 002 2h1v1a2 2 0 01-2 2H4a1 1 0 000 2h1a4 4 0 004-4V6a2 2 0 00-2-2H6zm7 0a2 2 0 00-2 2v3a2 2 0 002 2h1v1a2 2 0 01-2 2h-1a1 1 0 000 2h1a4 4 0 004-4V6a2 2 0 00-2-2h-1z"/>
          </svg>
        </span>
        <span id="selected-text-chip-label"></span>
        <button id="selected-text-chip-dismiss" aria-label="Remove selected text">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
      <!-- Input row: textarea + embedded send button -->
      <div id="input-row">
        <textarea id="chat-input" placeholder="Ask a side question…" rows="1" aria-label="Side chat input" disabled></textarea>
        <button class="btn btn-icon" id="send-btn" disabled aria-label="Send message">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Bottom bar ────────────────────────────────────────────────────── -->
  <div id="bottom-bar">
    <button class="btn btn-ghost btn-sm" id="inject-btn" disabled>Add Summary</button>
    <button class="btn btn-ghost btn-sm" id="clear-btn" disabled>Clear</button>
    <div id="bottom-bar-right">
      <select id="model-select" title="Select model" aria-label="Select model"></select>
      <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Open settings">
        <!-- Gear icon -->
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- ── Toast container ───────────────────────────────────────────────── -->
<div id="toast-container" aria-live="polite"></div>

<script src="sidepanel.js"></script>
</body>
</html>
